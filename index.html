<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Day</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Day" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2f2f7; --surface: #fff; --surface2: #f2f2f7;
      --text: #000; --text2: rgba(60,60,67,0.8); --text3: rgba(60,60,67,0.4);
      --border: rgba(60,60,67,0.12); --border2: rgba(60,60,67,0.22);
      --blue: #007AFF; --green: #34C759; --red: #FF3B30;
      --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000; --surface: #1c1c1e; --surface2: #2c2c2e;
        --text: #fff; --text2: rgba(235,235,245,0.6); --text3: rgba(235,235,245,0.3);
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      }
    }
    html,body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
    #app { display:flex; flex-direction:column; height:100%; max-width:768px; margin:0 auto; }

    /* HEADER */
    #header { background:var(--surface); padding:calc(var(--safe-top) + 14px) 16px 12px; border-bottom:0.5px solid var(--border); flex-shrink:0; z-index:10; }
    .header-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .day-nav { display:flex; align-items:center; flex:1; background:var(--surface2); border-radius:12px; border:0.5px solid var(--border); overflow:hidden; }
    .day-nav-btn { width:40px; height:40px; border:none; background:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--blue); flex-shrink:0; }
    .day-nav-btn:active { background:var(--border); }
    .day-nav-center { flex:1; text-align:center; cursor:pointer; padding:2px 0; }
    .day-nav-date { font-size:13px; font-weight:600; color:var(--text); line-height:1.3; }
    .day-nav-label { font-size:11px; color:var(--text3); }
    .day-nav-center.is-today .day-nav-date { color:var(--blue); }
    .icon-btn { width:40px; height:40px; border-radius:12px; background:var(--surface2); border:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; -webkit-appearance:none; flex-shrink:0; transition:transform 0.1s; }
    .icon-btn:active { transform:scale(0.93); }
    .icon-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }
    .header-title-row { display:flex; align-items:baseline; gap:8px; }
    .header-title { font-size:28px; font-weight:700; letter-spacing:-0.5px; line-height:1; }
    .header-sub { font-size:13px; color:var(--text2); }
    .progress-wrap { margin-top:10px; height:4px; border-radius:2px; background:var(--border); overflow:hidden; }
    .progress-fill { height:100%; border-radius:2px; background:var(--green); transition:width 0.4s ease; }

    /* COPY TASKS BANNER — shown when viewing a non-today day that has tasks */
    #copy-banner { display:none; margin:12px 14px 0; background:rgba(0,122,255,0.08); border:0.5px solid rgba(0,122,255,0.25); border-radius:12px; padding:11px 14px; flex-shrink:0; }
    #copy-banner.visible { display:flex; align-items:center; gap:10px; }
    .copy-banner-text { flex:1; font-size:14px; color:var(--blue); font-weight:500; }
    .copy-banner-btn { background:var(--blue); color:#fff; border:none; border-radius:9px; padding:7px 14px; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .copy-banner-btn:active { opacity:0.8; }

    /* SCROLL */
    #scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px 0; }

    /* EMPTY */
    .empty { display:flex; flex-direction:column; align-items:center; padding-top:70px; gap:10px; opacity:0.42; }
    .empty-icon { font-size:48px; }
    .empty-title { font-size:18px; font-weight:600; }
    .empty-sub { font-size:14px; color:var(--text2); text-align:center; padding:0 30px; }

    /* SECTION */
    .section-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.9px; margin:18px 4px 8px; }

    /* TASK */
    .task-wrap { position:relative; margin-bottom:8px; border-radius:14px; overflow:hidden; }
    .task-delete-bg { position:absolute; right:0; top:0; bottom:0; width:90px; background:var(--red); display:flex; align-items:center; justify-content:center; border-radius:0 14px 14px 0; }
    .task-delete-bg button { background:none; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; padding:0 16px; height:100%; }
    .task-row { background:var(--surface); border:0.5px solid var(--border); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:12px; position:relative; z-index:1; transition:transform 0.25s ease,opacity 0.2s; -webkit-user-select:none; user-select:none; will-change:transform; }
    .task-row.drag-placeholder { opacity:0.25; border:1.5px dashed var(--blue); background:transparent; }
    .drag-handle { display:flex; align-items:center; justify-content:center; opacity:0.28; flex-shrink:0; width:24px; touch-action:none; cursor:grab; padding:5px; }
    .checkbox { width:26px; height:26px; border-radius:50%; border:2px solid var(--border2); background:transparent; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; transition:all 0.18s; }
    .checkbox.checked { background:var(--green); border-color:var(--green); }
    .task-text { flex:1; font-size:16px; line-height:1.4; word-break:break-word; }
    .task-text.done { color:var(--text3); text-decoration:line-through; }

    /* INPUT */
    #input-bar { background:var(--surface); border-top:0.5px solid var(--border); padding:11px 14px calc(var(--safe-bottom) + 11px); flex-shrink:0; }
    .input-row { display:flex; gap:10px; align-items:center; }
    .task-input { flex:1; background:var(--surface2); border:0.5px solid var(--border); border-radius:12px; padding:11px 14px; font-size:16px; font-family:inherit; color:var(--text); outline:none; -webkit-appearance:none; transition:border-color 0.15s; }
    .task-input:focus { border-color:var(--blue); }
    .task-input::placeholder { color:var(--text3); }
    .add-btn { width:42px; height:42px; border-radius:12px; background:var(--blue); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform 0.1s,opacity 0.2s; flex-shrink:0; }
    .add-btn:disabled { opacity:0.32; cursor:default; }
    .add-btn:not(:disabled):active { transform:scale(0.93); }

    /* CALENDAR */
    #calendar { background:var(--surface); border:0.5px solid var(--border); border-radius:16px; overflow:hidden; }
    .cal-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 12px; border-bottom:0.5px solid var(--border); }
    .cal-title { font-size:17px; font-weight:600; }
    .cal-nav { width:32px; height:32px; border-radius:8px; background:var(--surface2); border:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; -webkit-appearance:none; transition:transform 0.1s; }
    .cal-nav:active { transform:scale(0.93); }
    .cal-daynames { display:grid; grid-template-columns:repeat(7,1fr); padding:10px 10px 4px; }
    .cal-dayname { text-align:center; font-size:12px; font-weight:500; color:var(--text3); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; padding:4px 10px 14px; }
    .cal-cell { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:10px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background 0.12s; }
    .cal-cell.empty { cursor:default; pointer-events:none; }
    .cal-cell:not(.empty):active { background:var(--border) !important; }
    .cal-cell.today { background:var(--blue); }
    .cal-cell.selected:not(.today) { background:rgba(0,122,255,0.13); outline:1.5px solid var(--blue); }
    .cal-day-num { font-size:14px; font-weight:400; color:var(--text2); line-height:1; }
    .cal-cell.has-tasks .cal-day-num { font-weight:700; color:var(--text); }
    .cal-cell.today .cal-day-num { color:#fff; font-weight:700; }
    .cal-cell.selected:not(.today) .cal-day-num { color:var(--blue); font-weight:700; }
    .cal-dot { width:5px; height:5px; border-radius:50%; margin-top:2px; }
    .cal-cell:not(.today) .cal-dot { background:var(--blue); }
    .cal-cell.all-done:not(.today) .cal-dot { background:var(--green); }
    .cal-cell.today .cal-dot { background:rgba(255,255,255,0.85); }
    .cal-legend { border-top:0.5px solid var(--border); padding:11px 18px; display:flex; gap:18px; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
    .legend-dot { width:8px; height:8px; border-radius:50%; }

    /* DRAG GHOST */
    #drag-ghost { position:fixed; pointer-events:none; z-index:9999; border-radius:14px; box-shadow:0 12px 32px rgba(0,0,0,0.22); transform:scale(1.04); opacity:0.96; transition:none !important; }

    /* COPY BOTTOM SHEET */
    #sheet-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; opacity:0; transition:opacity 0.25s; pointer-events:none; }
    #sheet-backdrop.open { opacity:1; pointer-events:auto; }
    #copy-sheet {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(102%);
      width:100%; max-width:768px; background:var(--surface);
      border-radius:20px 20px 0 0; z-index:201;
      transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);
      padding-bottom:calc(var(--safe-bottom) + 6px);
    }
    #copy-sheet.open { transform:translateX(-50%) translateY(0); }
    .sheet-handle { width:36px; height:4px; border-radius:2px; background:var(--border2); margin:10px auto 0; }
    .sheet-header { padding:14px 20px 0; }
    .sheet-title { font-size:17px; font-weight:700; }
    .sheet-subtitle { font-size:13px; color:var(--text2); margin-top:3px; }
    .sheet-row-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 6px; border-top:0.5px solid var(--border); margin-top:12px; }
    .sheet-row-label { font-size:12px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.7px; }
    .sheet-select-all { font-size:14px; color:var(--blue); background:none; border:none; font-family:inherit; cursor:pointer; padding:2px 0; font-weight:500; }
    .sheet-tasks { max-height:36vh; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 16px 8px; }
    .sheet-task-item { display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:0.5px solid var(--border); cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .sheet-task-item:last-child { border-bottom:none; }
    .sheet-check { width:24px; height:24px; border-radius:50%; border:2px solid var(--border2); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; }
    .sheet-check.on { background:var(--blue); border-color:var(--blue); }
    .sheet-check svg { display:block; }
    .sheet-item-text { font-size:15px; flex:1; line-height:1.3; }
    .sheet-item-text.done-text { color:var(--text3); text-decoration:line-through; }
    .sheet-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 16px 4px; border-top:0.5px solid var(--border); margin-top:4px; }
    .sheet-btn { height:52px; border-radius:14px; border:none; font-size:16px; font-weight:600; font-family:inherit; cursor:pointer; transition:transform 0.1s,opacity 0.15s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; }
    .sheet-btn:active { transform:scale(0.97); }
    .sheet-btn:disabled { opacity:0.3; cursor:default; }
    .sheet-btn .btn-label { font-size:15px; font-weight:700; }
    .sheet-btn .btn-sub { font-size:11px; font-weight:400; opacity:0.8; }
    .sheet-btn.to-today { background:var(--blue); color:#fff; }
    .sheet-btn.to-tomorrow { background:var(--surface2); color:var(--blue); border:0.5px solid rgba(0,122,255,0.3); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .task-wrap { animation:fadeUp 0.18s ease; }
    @media (min-width:600px) { #app{border-left:0.5px solid var(--border);border-right:0.5px solid var(--border);} .header-title{font-size:32px;} }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-top">
      <div class="day-nav">
        <button class="day-nav-btn" id="day-prev">
          <svg width="9" height="15" viewBox="0 0 9 15" fill="none"><path d="M8 1L2 7.5L8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="day-nav-center" id="day-nav-center">
          <div class="day-nav-date" id="day-nav-date"></div>
          <div class="day-nav-label" id="day-nav-label"></div>
        </div>
        <button class="day-nav-btn" id="day-next">
          <svg width="9" height="15" viewBox="0 0 9 15" fill="none"><path d="M1 1L7 7.5L1 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <button class="icon-btn" id="cal-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="4" width="16" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 8H18" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 2V5M14 2V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="6.5" cy="12" r="1" fill="currentColor"/>
          <circle cx="10" cy="12" r="1" fill="currentColor"/>
          <circle cx="13.5" cy="12" r="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <div class="header-title-row">
      <div class="header-title" id="hdr-title">My Day</div>
      <div class="header-sub" id="hdr-sub"></div>
    </div>
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Copy tasks banner shown when viewing another day with tasks -->
  <div id="copy-banner">
    <span class="copy-banner-text" id="copy-banner-text"></span>
    <button class="copy-banner-btn" id="copy-banner-btn">Copy tasks</button>
  </div>

  <div id="scroll"></div>

  <div id="input-bar">
    <div class="input-row">
      <input class="task-input" id="task-input" placeholder="Add a task…" autocomplete="off" />
      <button class="add-btn" id="add-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3V15M3 9H15" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Copy sheet -->
<div id="sheet-backdrop"></div>
<div id="copy-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">Copy tasks</div>
    <div class="sheet-subtitle" id="sheet-subtitle"></div>
  </div>
  <div class="sheet-row-header">
    <span class="sheet-row-label">Select tasks</span>
    <button class="sheet-select-all" id="sheet-select-all">Select all</button>
  </div>
  <div class="sheet-tasks" id="sheet-tasks"></div>
  <div class="sheet-actions">
    <button class="sheet-btn to-today" id="sheet-btn-today" disabled>
      <span class="btn-label">Add to Today</span>
      <span class="btn-sub" id="sheet-today-sub"></span>
    </button>
    <button class="sheet-btn to-tomorrow" id="sheet-btn-tomorrow" disabled>
      <span class="btn-label">Add to Tomorrow</span>
      <span class="btn-sub" id="sheet-tomorrow-sub"></span>
    </button>
  </div>
</div>

<script>
// ── STORAGE ───────────────────────────────────────────────────────────────────
const STORE = 'myday_pwa_v2';
function load() { try { return JSON.parse(localStorage.getItem(STORE)) || {days:{},lastSeen:null}; } catch { return {days:{},lastSeen:null}; } }
function save(d) { try { localStorage.setItem(STORE, JSON.stringify(d)); } catch {} }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function fmtKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayKey() { return fmtKey(new Date()); }
function tomorrowKey() { return offsetKey(todayKey(), 1); }

function offsetKey(key, days) {
  const d = new Date(key+'T12:00:00');
  d.setDate(d.getDate()+days);
  return fmtKey(d);
}

function rollover(d) {
  const today = todayKey();
  if (d.lastSeen && d.lastSeen !== today) {
    const prev = d.days[d.lastSeen] || [];
    const incomplete = prev.filter(t=>!t.done).map(t=>({...t,id:uid(),done:false}));
    if (incomplete.length) {
      const existing = d.days[today] || [];
      const texts = new Set(existing.map(t=>t.text));
      d.days[today] = [...existing, ...incomplete.filter(t=>!texts.has(t.text))];
    }
  }
  d.lastSeen = today;
  return d;
}

// ── APP STATE ─────────────────────────────────────────────────────────────────
let state = rollover(load());
let viewKey = todayKey();
let showCal = false;
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function getTasks(key) { return state.days[key||viewKey] || []; }
function setTasks(tasks, key) {
  state.days[key||viewKey] = tasks;
  save(state);
  render();
}

function relativeLabel(key) {
  const today = todayKey();
  if (key === today) return 'Today — tap to return';
  if (key === offsetKey(today,-1)) return 'Yesterday';
  if (key === offsetKey(today,1)) return 'Tomorrow';
  const diff = Math.round((new Date(key+'T12:00:00') - new Date(today+'T12:00:00')) / 86400000);
  if (Math.abs(diff) <= 6) return new Date(key+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long'});
  return '';
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function renderHeader() {
  const tasks = getTasks();
  const done = tasks.filter(t=>t.done).length;
  const total = tasks.length;
  const today = todayKey();
  const d = new Date(viewKey+'T12:00:00');

  document.getElementById('day-nav-date').textContent = d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('day-nav-label').textContent = relativeLabel(viewKey);
  document.getElementById('day-nav-center').className = 'day-nav-center'+(viewKey===today?' is-today':'');
  document.getElementById('hdr-title').textContent = viewKey===today ? 'My Day' : d.toLocaleDateString('en-AU',{month:'long',day:'numeric'});
  document.getElementById('hdr-sub').textContent = total ? `${done} of ${total} done` : '';

  const pw = document.getElementById('progress-wrap');
  if (total) { pw.style.display='block'; document.getElementById('progress-fill').style.width=(done/total*100)+'%'; }
  else pw.style.display='none';

  document.getElementById('cal-btn').className = 'icon-btn'+(showCal?' active':'');

  // Copy banner: show when viewing another day (not today/tomorrow) that has tasks
  const banner = document.getElementById('copy-banner');
  const isOtherDay = viewKey !== today;
  const hasTasks = tasks.length > 0;
  if (isOtherDay && hasTasks && !showCal) {
    banner.className = 'visible';
    const fromLabel = viewKey === offsetKey(today,-1) ? 'Yesterday' :
      viewKey === tomorrowKey() ? 'Tomorrow' :
      d.toLocaleDateString('en-AU',{month:'short',day:'numeric'});
    document.getElementById('copy-banner-text').textContent = `Add tasks from ${fromLabel} to another day`;
  } else {
    banner.className = '';
  }
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  const today = todayKey();
  const dim = new Date(calYear,calMonth+1,0).getDate();
  const firstDay = new Date(calYear,calMonth,1).getDay();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let cells='';
  for(let i=0;i<firstDay;i++) cells+='<div class="cal-cell empty"></div>';
  for(let day=1;day<=dim;day++){
    const dk=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dt=state.days[dk]||[];
    const has=dt.length>0, allDone=has&&dt.every(t=>t.done);
    let cls='cal-cell';
    if(dk===today) cls+=' today';
    if(dk===viewKey) cls+=' selected';
    if(has) cls+=' has-tasks';
    if(allDone) cls+=' all-done';
    cells+=`<div class="${cls}" data-calday="${dk}"><span class="cal-day-num">${day}</span>${has?'<div class="cal-dot"></div>':''}</div>`;
  }
  return `<div id="calendar">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev"><svg width="8" height="13" viewBox="0 0 8 13" fill="none"><path d="M7 1L1 6.5L7 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <span class="cal-title">${months[calMonth]} ${calYear}</span>
      <button class="cal-nav" id="cal-next"><svg width="8" height="13" viewBox="0 0 8 13" fill="none"><path d="M1 1L7 6.5L1 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div class="cal-daynames">${days.map(d=>`<div class="cal-dayname">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Has tasks</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>All done</div>
    </div>
  </div>`;
}

// ── TASKS ─────────────────────────────────────────────────────────────────────
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderTasks() {
  const tasks = getTasks();
  const today = todayKey();
  if(!tasks.length){
    const sub = viewKey>today?'Tap + to plan ahead for this day':viewKey<today?'Nothing recorded for this day':'Add something below to get started';
    return `<div class="empty"><div class="empty-icon">${viewKey<today?'📅':'✓'}</div><div class="empty-title">No tasks</div><div class="empty-sub">${sub}</div></div>`;
  }
  const incomplete=tasks.filter(t=>!t.done), complete=tasks.filter(t=>t.done);
  const row=task=>`<div class="task-wrap" data-id="${task.id}">
    <div class="task-delete-bg"><button data-del="${task.id}">Delete</button></div>
    <div class="task-row">
      <div class="drag-handle" data-handle="${task.id}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="4" cy="3" r="1.3" fill="currentColor"/><circle cx="4" cy="7" r="1.3" fill="currentColor"/><circle cx="4" cy="11" r="1.3" fill="currentColor"/><circle cx="10" cy="3" r="1.3" fill="currentColor"/><circle cx="10" cy="7" r="1.3" fill="currentColor"/><circle cx="10" cy="11" r="1.3" fill="currentColor"/></svg></div>
      <div class="checkbox${task.done?' checked':''}" data-toggle="${task.id}">${task.done?'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
      <span class="task-text${task.done?' done':''}">${esc(task.text)}</span>
    </div>
  </div>`;
  let html=incomplete.map(row).join('');
  if(complete.length) html+=`<div class="section-label">Completed · ${complete.length}</div>`+complete.map(row).join('');
  return html;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  renderHeader();
  const scroll=document.getElementById('scroll');
  if(showCal){
    scroll.innerHTML=renderCalendar();
    document.getElementById('cal-prev').addEventListener('click',()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();});
    document.getElementById('cal-next').addEventListener('click',()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}render();});
    scroll.querySelectorAll('[data-calday]').forEach(el=>{
      el.addEventListener('click',()=>{
        viewKey=el.dataset.calday;
        showCal=false;
        document.getElementById('input-bar').style.display='';
        const d=new Date(viewKey+'T12:00:00');
        calYear=d.getFullYear(); calMonth=d.getMonth();
        render();
      });
    });
  } else {
    scroll.innerHTML=renderTasks();
    attachEvents();
  }
}

// ── COPY SHEET ────────────────────────────────────────────────────────────────
let selectedIds = new Set();

function openCopySheet() {
  const tasks = getTasks();
  const today = todayKey();
  const tomorrow = tomorrowKey();
  const fromDate = new Date(viewKey+'T12:00:00');
  const fromLabel = viewKey === offsetKey(today,-1) ? 'Yesterday' :
    viewKey === tomorrow ? 'Tomorrow' :
    fromDate.toLocaleDateString('en-AU',{weekday:'long', month:'short', day:'numeric'});

  document.getElementById('sheet-title').textContent = `Copy from ${fromLabel}`;
  document.getElementById('sheet-subtitle').textContent = 'Choose tasks to add to today or tomorrow';

  // Today/tomorrow button sublabels
  document.getElementById('sheet-today-sub').textContent = new Date(today+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('sheet-tomorrow-sub').textContent = new Date(tomorrow+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});

  // Pre-select all incomplete tasks
  selectedIds = new Set(tasks.filter(t=>!t.done).map(t=>t.id));

  renderSheetTasks(tasks);
  updateSheetButtons();

  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('copy-sheet').classList.add('open');
}

function renderSheetTasks(tasks) {
  const html = tasks.map(task=>`
    <div class="sheet-task-item" data-sid="${task.id}">
      <div class="sheet-check${selectedIds.has(task.id)?' on':''}" data-scheck="${task.id}">
        ${selectedIds.has(task.id)?`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
      <span class="sheet-item-text${task.done?' done-text':''}">${esc(task.text)}</span>
    </div>
  `).join('');
  document.getElementById('sheet-tasks').innerHTML = html;

  document.querySelectorAll('[data-sid]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id = el.dataset.sid;
      if(selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      const tasks = getTasks();
      renderSheetTasks(tasks);
      updateSheetButtons();
    });
  });

  // Select all toggle
  const tasks2 = getTasks();
  const allSelected = tasks2.every(t=>selectedIds.has(t.id));
  document.getElementById('sheet-select-all').textContent = allSelected ? 'Deselect all' : 'Select all';
}

function updateSheetButtons() {
  const hasSelection = selectedIds.size > 0;
  const today = todayKey();
  const tomorrow = tomorrowKey();

  const todayBtn = document.getElementById('sheet-btn-today');
  const tomBtn = document.getElementById('sheet-btn-tomorrow');

  // Disable if viewing today/tomorrow and trying to copy to same day
  todayBtn.disabled = !hasSelection || viewKey === today;
  tomBtn.disabled = !hasSelection || viewKey === tomorrow;

  if (viewKey === today) {
    todayBtn.title = "You're already viewing today";
  }
  if (viewKey === tomorrow) {
    tomBtn.title = "You're already viewing tomorrow";
  }
}

function closeCopySheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('copy-sheet').classList.remove('open');
}

function copyTasksTo(destKey) {
  const tasks = getTasks();
  const selected = tasks.filter(t=>selectedIds.has(t.id));
  if(!selected.length) return;

  const existing = state.days[destKey] || [];
  const existingTexts = new Set(existing.map(t=>t.text));
  const toAdd = selected.filter(t=>!existingTexts.has(t.text)).map(t=>({id:uid(),text:t.text,done:false}));

  if(toAdd.length) {
    state.days[destKey] = [...existing, ...toAdd];
    save(state);
  }

  closeCopySheet();

  // Show brief confirmation then navigate to dest
  const destLabel = destKey === todayKey() ? 'Today' : 'Tomorrow';
  const count = toAdd.length;
  const skipped = selected.length - toAdd.length;

  // Navigate to the destination day
  viewKey = destKey;
  const d = new Date(destKey+'T12:00:00');
  calYear = d.getFullYear(); calMonth = d.getMonth();
  render();

  // Show a brief toast
  showToast(`${count} task${count!==1?'s':''} added to ${destLabel}${skipped?' ('+skipped+' already existed)':''}`);
}

function showToast(msg) {
  const existing = document.getElementById('toast');
  if(existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.textContent = msg;
  toast.style.cssText = `position:fixed;bottom:calc(var(--safe-bottom,0px) + 90px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;font-weight:500;z-index:300;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden;animation:fadeUp 0.2s ease;pointer-events:none;`;
  document.body.appendChild(toast);
  setTimeout(()=>{ toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(()=>toast.remove(),300); }, 2500);
}

// Sheet button events
document.getElementById('sheet-btn-today').addEventListener('click',()=>copyTasksTo(todayKey()));
document.getElementById('sheet-btn-tomorrow').addEventListener('click',()=>copyTasksTo(tomorrowKey()));
document.getElementById('sheet-backdrop').addEventListener('click', closeCopySheet);
document.getElementById('sheet-select-all').addEventListener('click',()=>{
  const tasks = getTasks();
  const allSelected = tasks.every(t=>selectedIds.has(t.id));
  if(allSelected) selectedIds.clear();
  else tasks.forEach(t=>selectedIds.add(t.id));
  renderSheetTasks(tasks);
  updateSheetButtons();
});
document.getElementById('copy-banner-btn').addEventListener('click', openCopySheet);

// ── EVENTS ────────────────────────────────────────────────────────────────────
let drag={active:false,id:null,srcEl:null,ghost:null,startY:0,curY:0};

function attachEvents(){
  const scroll=document.getElementById('scroll');

  scroll.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click',()=>{
      setTasks(getTasks().map(t=>t.id===el.dataset.toggle?{...t,done:!t.done}:t));
    });
  });

  scroll.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',()=>setTasks(getTasks().filter(t=>t.id!==el.dataset.del)));
  });

  scroll.querySelectorAll('.task-wrap').forEach(wrap=>{
    const row=wrap.querySelector('.task-row');
    let sx,sy,swiping=false;
    wrap.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;swiping=false;},{passive:true});
    wrap.addEventListener('touchmove',e=>{
      if(drag.active) return;
      const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
      if(!swiping&&Math.abs(dx)<6&&Math.abs(dy)<6) return;
      if(!swiping){swiping=Math.abs(dx)>Math.abs(dy);}
      if(!swiping) return;
      e.preventDefault();
      row.style.transform=`translateX(${Math.max(-90,Math.min(0,dx))}px)`;
      row.style.transition='none';
    },{passive:false});
    wrap.addEventListener('touchend',e=>{
      if(!swiping) return;
      const dx=e.changedTouches[0].clientX-sx;
      row.style.transition='transform 0.25s ease';
      row.style.transform=dx<-44?'translateX(-90px)':'translateX(0)';
    },{passive:true});
  });

  scroll.querySelectorAll('[data-handle]').forEach(handle=>{
    handle.addEventListener('touchstart',e=>{
      e.stopPropagation();
      const wrap=handle.closest('.task-wrap');
      if(!wrap) return;
      if(navigator.vibrate) navigator.vibrate(8);
      const rect=wrap.getBoundingClientRect();
      const ghost=wrap.cloneNode(true);
      ghost.id='drag-ghost';
      ghost.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;pointer-events:none;z-index:9999;border-radius:14px;box-shadow:0 12px 32px rgba(0,0,0,0.22);transform:scale(1.04);opacity:0.97;`;
      document.body.appendChild(ghost);
      wrap.querySelector('.task-row').classList.add('drag-placeholder');
      drag={active:true,id:wrap.dataset.id,srcEl:wrap,ghost,startY:e.touches[0].clientY,curY:e.touches[0].clientY};
    },{passive:true});
  });

  scroll.querySelectorAll('.task-wrap').forEach(wrap=>{
    wrap.setAttribute('draggable','true');
    wrap.addEventListener('dragstart',e=>{
      drag.desktopId=wrap.dataset.id;
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>wrap.querySelector('.task-row').style.opacity='0.35',0);
    });
    wrap.addEventListener('dragend',()=>wrap.querySelector('.task-row').style.opacity='');
    wrap.addEventListener('dragover',e=>{e.preventDefault();wrap.querySelector('.task-row').style.borderColor='var(--blue)';});
    wrap.addEventListener('dragleave',()=>wrap.querySelector('.task-row').style.borderColor='');
    wrap.addEventListener('drop',e=>{
      e.preventDefault();
      wrap.querySelector('.task-row').style.borderColor='';
      if(!drag.desktopId||drag.desktopId===wrap.dataset.id) return;
      reorder(drag.desktopId, wrap.dataset.id);
    });
  });
}

function reorder(fromId, toId){
  const tasks=getTasks();
  const fi=tasks.findIndex(t=>t.id===fromId), ti=tasks.findIndex(t=>t.id===toId);
  if(fi<0||ti<0) return;
  const arr=[...tasks]; const [item]=arr.splice(fi,1); arr.splice(ti,0,item);
  setTasks(arr);
}

document.addEventListener('touchmove',e=>{
  if(!drag.active||!drag.ghost) return;
  e.preventDefault();
  const y=e.touches[0].clientY;
  drag.curY=y;
  const rect=drag.srcEl.getBoundingClientRect();
  drag.ghost.style.top=(rect.top+(y-drag.startY))+'px';
  const scroll=document.getElementById('scroll');
  scroll.querySelectorAll('.task-wrap').forEach(w=>{
    if(w===drag.srcEl) return;
    const r=w.getBoundingClientRect();
    const row=w.querySelector('.task-row');
    if(row) row.style.borderColor=(y>=r.top&&y<=r.bottom)?'var(--blue)':'';
  });
},{passive:false});

document.addEventListener('touchend',e=>{
  if(!drag.active) return;
  if(drag.ghost){drag.ghost.remove();drag.ghost=null;}
  if(drag.srcEl) drag.srcEl.querySelector('.task-row').classList.remove('drag-placeholder');
  const scroll=document.getElementById('scroll');
  const wraps=Array.from(scroll.querySelectorAll('.task-wrap'));
  wraps.forEach(w=>{const r=w.querySelector('.task-row');if(r)r.style.borderColor='';});
  const y=drag.curY;
  const target=wraps.find(w=>{
    if(w===drag.srcEl) return false;
    const r=w.getBoundingClientRect();
    return y>=r.top&&y<=r.bottom;
  });
  const fromId=drag.id;
  drag={active:false,id:null,srcEl:null,ghost:null,startY:0,curY:0};
  if(target){ reorder(fromId, target.dataset.id); } else render();
},{passive:true});

// ── INPUT ─────────────────────────────────────────────────────────────────────
const inputEl=document.getElementById('task-input');
const addBtnEl=document.getElementById('add-btn');
inputEl.addEventListener('input',()=>addBtnEl.disabled=!inputEl.value.trim());
function addTask(){
  const text=inputEl.value.trim();
  if(!text) return;
  setTasks([...getTasks(),{id:uid(),text,done:false}]);
  inputEl.value=''; addBtnEl.disabled=true; inputEl.focus();
}
addBtnEl.addEventListener('click',addTask);
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});

// ── DAY NAV ───────────────────────────────────────────────────────────────────
document.getElementById('day-prev').addEventListener('click',()=>{
  viewKey=offsetKey(viewKey,-1);
  const d=new Date(viewKey+'T12:00:00'); calYear=d.getFullYear(); calMonth=d.getMonth();
  render();
});
document.getElementById('day-next').addEventListener('click',()=>{
  viewKey=offsetKey(viewKey,1);
  const d=new Date(viewKey+'T12:00:00'); calYear=d.getFullYear(); calMonth=d.getMonth();
  render();
});
document.getElementById('day-nav-center').addEventListener('click',()=>{
  viewKey=todayKey();
  const d=new Date(); calYear=d.getFullYear(); calMonth=d.getMonth();
  render();
});

// ── CALENDAR BTN ──────────────────────────────────────────────────────────────
document.getElementById('cal-btn').addEventListener('click',()=>{
  showCal=!showCal;
  document.getElementById('input-bar').style.display=showCal?'none':'';
  render();
});

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){state=rollover(load()); render();}
});
</script>
