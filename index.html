<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Day</title>

  <!-- PWA / iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Day" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f2f7;
      --surface: #ffffff;
      --surface2: #f2f2f7;
      --text: #000000;
      --text2: #3c3c43cc;
      --text3: #3c3c4399;
      --border: rgba(60,60,67,0.12);
      --border2: rgba(60,60,67,0.22);
      --blue: #007AFF;
      --green: #34C759;
      --red: #FF3B30;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: #1c1c1e;
        --surface2: #2c2c2e;
        --text: #ffffff;
        --text2: rgba(235,235,245,0.6);
        --text3: rgba(235,235,245,0.3);
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
      }
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 768px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    #header {
      background: var(--surface);
      padding: calc(var(--safe-top) + 16px) 20px 14px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .header-date {
      font-size: 13px;
      color: var(--text2);
      letter-spacing: 0.2px;
      margin-bottom: 3px;
    }

    .header-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .header-sub {
      font-size: 13px;
      color: var(--text2);
      margin-top: 4px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      margin-top: 2px;
    }
    .icon-btn:active { transform: scale(0.93); }
    .icon-btn.active { background: var(--blue); border-color: var(--blue); }
    .icon-btn svg { display: block; }

    .progress-bar-wrap {
      margin-top: 12px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--green);
      transition: width 0.4s ease;
    }

    /* ── SCROLL AREA ── */
    #scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 0;
    }

    /* ── EMPTY STATE ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
      gap: 10px;
      opacity: 0.45;
    }
    .empty-icon { font-size: 52px; }
    .empty-title { font-size: 18px; font-weight: 600; }
    .empty-sub { font-size: 14px; color: var(--text2); }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.9px;
      margin: 20px 4px 8px;
    }

    /* ── TASK ROW ── */
    .task-wrap {
      position: relative;
      margin-bottom: 8px;
      border-radius: 14px;
      overflow: hidden;
    }

    .task-delete-bg {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 90px;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 14px 14px 0;
    }
    .task-delete-bg button {
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      padding: 0 16px;
      height: 100%;
    }

    .task-row {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
      transition: transform 0.25s ease, opacity 0.2s;
      touch-action: pan-y;
      cursor: default;
      -webkit-user-select: none;
      user-select: none;
    }
    .task-row.dragging { opacity: 0.4; }
    .task-row.drag-over { border-color: var(--blue); transform: scale(1.01); }

    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.3;
      flex-shrink: 0;
      width: 20px;
      cursor: grab;
    }
    .drag-handle:active { cursor: grabbing; }

    .checkbox {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.2s;
    }
    .checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }
    .checkbox svg { display: block; }

    .task-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.4;
      transition: color 0.2s;
      word-break: break-word;
    }
    .task-text.done {
      color: var(--text3);
      text-decoration: line-through;
    }

    /* ── INPUT BAR ── */
    #input-bar {
      background: var(--surface);
      border-top: 0.5px solid var(--border);
      padding: 12px 16px calc(var(--safe-bottom) + 12px);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .task-input {
      flex: 1;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.15s;
    }
    .task-input:focus { border-color: var(--blue); }
    .task-input::placeholder { color: var(--text3); }

    .add-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--blue);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      flex-shrink: 0;
    }
    .add-btn:disabled { opacity: 0.35; cursor: default; }
    .add-btn:not(:disabled):active { transform: scale(0.93); }

    /* ── CALENDAR ── */
    #calendar {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .cal-title { font-size: 17px; font-weight: 600; }
    .cal-nav {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-appearance: none;
      transition: transform 0.1s;
    }
    .cal-nav:active { transform: scale(0.93); }

    .cal-daynames {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 10px 12px 4px;
    }
    .cal-dayname {
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: 0.4px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding: 4px 12px 16px;
    }
    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      position: relative;
    }
    .cal-cell.today { background: var(--blue); }
    .cal-day-num {
      font-size: 14px;
      font-weight: 400;
      color: var(--text2);
      line-height: 1;
    }
    .cal-cell.has-tasks .cal-day-num { font-weight: 700; color: var(--text); }
    .cal-cell.today .cal-day-num { color: #fff; font-weight: 700; }

    .cal-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      margin-top: 2px;
    }
    .cal-cell:not(.today) .cal-dot { background: var(--blue); }
    .cal-cell.all-done:not(.today) .cal-dot { background: var(--green); }
    .cal-cell.today .cal-dot { background: rgba(255,255,255,0.8); }

    .cal-legend {
      border-top: 0.5px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 20px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text2);
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-wrap { animation: fadeSlideIn 0.2s ease; }

    /* ── iPad layout ── */
    @media (min-width: 600px) {
      #app { border-left: 0.5px solid var(--border); border-right: 0.5px solid var(--border); }
      .task-row { padding: 16px 18px; }
      .header-title { font-size: 34px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-row">
      <div>
        <div class="header-date" id="hdr-date"></div>
        <div class="header-title">My Day</div>
        <div class="header-sub" id="hdr-sub"></div>
      </div>
      <button class="icon-btn" id="cal-btn" title="Calendar" aria-label="Toggle calendar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" id="cal-icon">
          <rect x="2" y="4" width="16" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 8H18" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 2V5M14 2V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="6.5" cy="12" r="1" fill="currentColor"/>
          <circle cx="10" cy="12" r="1" fill="currentColor"/>
          <circle cx="13.5" cy="12" r="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="scroll"></div>

  <div id="input-bar">
    <div class="input-row">
      <input class="task-input" id="task-input" placeholder="Add a task…" autocomplete="off" autocorrect="on" />
      <button class="add-btn" id="add-btn" disabled aria-label="Add task">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 3V15M3 9H15" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const STORE_KEY = 'myday_pwa_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {days:{},lastSeen:null}; }
  catch { return {days:{},lastSeen:null}; }
}

function save(d) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch {}
}

function todayKey() {
  return new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
}

function rollover(d) {
  const today = todayKey();
  if (d.lastSeen && d.lastSeen !== today) {
    const prev = d.days[d.lastSeen] || [];
    const incomplete = prev.filter(t => !t.done).map(t => ({...t, id: uid(), done: false}));
    if (incomplete.length) {
      const existing = d.days[today] || [];
      const existingTexts = new Set(existing.map(t => t.text));
      const toAdd = incomplete.filter(t => !existingTexts.has(t.text));
      d.days[today] = [...existing, ...toAdd];
    }
  }
  d.lastSeen = today;
  return d;
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

let state = rollover(load());
let showCal = false;
let calYear, calMonth;
const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();

function getTasks() { return state.days[todayKey()] || []; }
function setTasks(tasks) {
  state.days[todayKey()] = tasks;
  save(state);
  render();
}

// ── HEADER ───────────────────────────────────────────────────────────────────
function renderHeader() {
  const tasks = getTasks();
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('en-AU', {
    weekday: 'long', month: 'long', day: 'numeric'
  });
  const sub = document.getElementById('hdr-sub');
  sub.textContent = total ? `${done} of ${total} done` : '';
  const pw = document.getElementById('progress-wrap');
  const pf = document.getElementById('progress-fill');
  if (total) {
    pw.style.display = 'block';
    pf.style.width = (done / total * 100) + '%';
  } else {
    pw.style.display = 'none';
  }
  const btn = document.getElementById('cal-btn');
  const icon = document.getElementById('cal-icon');
  if (showCal) {
    btn.classList.add('active');
    icon.style.color = '#fff';
  } else {
    btn.classList.remove('active');
    icon.style.color = '';
  }
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function renderCalendar() {
  const today = todayKey();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div class="cal-cell"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayTasks = state.days[dk] || [];
    const hasTasks = dayTasks.length > 0;
    const allDone = hasTasks && dayTasks.every(t => t.done);
    const isToday = dk === today;
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (hasTasks) cls += ' has-tasks';
    if (allDone) cls += ' all-done';
    cells += `<div class="${cls}">
      <span class="cal-day-num">${d}</span>
      ${hasTasks ? '<div class="cal-dot"></div>' : ''}
    </div>`;
  }

  return `<div id="calendar">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">
        <svg width="8" height="13" viewBox="0 0 8 13" fill="none">
          <path d="M7 1L1 6.5L7 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="cal-title">${months[calMonth]} ${calYear}</span>
      <button class="cal-nav" id="cal-next">
        <svg width="8" height="13" viewBox="0 0 8 13" fill="none">
          <path d="M1 1L7 6.5L1 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="cal-daynames">${days.map(d=>`<div class="cal-dayname">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Has tasks</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> All done</div>
    </div>
  </div>`;
}

// ── TASKS ─────────────────────────────────────────────────────────────────────
let dragSrc = null;

function renderTasks() {
  const tasks = getTasks();
  if (!tasks.length) {
    return `<div class="empty">
      <div class="empty-icon">✓</div>
      <div class="empty-title">No tasks for today</div>
      <div class="empty-sub">Add something below</div>
    </div>`;
  }

  const incomplete = tasks.filter(t => !t.done);
  const complete = tasks.filter(t => t.done);

  const renderRow = (task) => {
    const realIdx = tasks.findIndex(t => t.id === task.id);
    return `<div class="task-wrap" data-id="${task.id}" draggable="true">
      <div class="task-delete-bg"><button data-del="${task.id}">Delete</button></div>
      <div class="task-row" data-idx="${realIdx}">
        <div class="drag-handle" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="4" cy="3" r="1.2" fill="currentColor"/><circle cx="4" cy="7" r="1.2" fill="currentColor"/>
            <circle cx="4" cy="11" r="1.2" fill="currentColor"/><circle cx="10" cy="3" r="1.2" fill="currentColor"/>
            <circle cx="10" cy="7" r="1.2" fill="currentColor"/><circle cx="10" cy="11" r="1.2" fill="currentColor"/>
          </svg>
        </div>
        <div class="checkbox ${task.done ? 'checked' : ''}" data-toggle="${task.id}">
          ${task.done ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>` : ''}
        </div>
        <span class="task-text ${task.done ? 'done' : ''}">${escHtml(task.text)}</span>
      </div>
    </div>`;
  };

  let html = incomplete.map(renderRow).join('');
  if (complete.length) {
    html += `<div class="section-label">Completed · ${complete.length}</div>`;
    html += complete.map(renderRow).join('');
  }
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  renderHeader();
  const scroll = document.getElementById('scroll');
  if (showCal) {
    scroll.innerHTML = renderCalendar();
    document.getElementById('cal-prev').addEventListener('click', () => {
      calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
      render();
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
      render();
    });
  } else {
    scroll.innerHTML = renderTasks();
    attachTaskEvents();
  }
}

// ── TASK EVENTS ───────────────────────────────────────────────────────────────
function attachTaskEvents() {
  const scroll = document.getElementById('scroll');

  // Toggle done
  scroll.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.toggle;
      setTasks(getTasks().map(t => t.id === id ? {...t, done: !t.done} : t));
    });
  });

  // Delete
  scroll.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.del;
      setTasks(getTasks().filter(t => t.id !== id));
    });
  });

  // Swipe to reveal delete
  scroll.querySelectorAll('.task-wrap').forEach(wrap => {
    let startX, startY, startScrollTop;
    const row = wrap.querySelector('.task-row');

    wrap.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startScrollTop = scroll.scrollTop;
    }, {passive: true});

    wrap.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (Math.abs(dy) > Math.abs(dx)) return; // vertical scroll
      e.preventDefault();
      const offset = Math.max(-90, Math.min(0, dx));
      row.style.transform = `translateX(${offset}px)`;
      row.style.transition = 'none';
    }, {passive: false});

    wrap.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      row.style.transition = 'transform 0.25s ease';
      if (dx < -50) {
        row.style.transform = 'translateX(-90px)';
      } else {
        row.style.transform = 'translateX(0)';
      }
    }, {passive: true});
  });

  // Drag & drop reorder (desktop)
  scroll.querySelectorAll('.task-wrap').forEach(wrap => {
    wrap.addEventListener('dragstart', e => {
      dragSrc = wrap.dataset.id;
      setTimeout(() => wrap.querySelector('.task-row').classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    wrap.addEventListener('dragend', () => {
      wrap.querySelector('.task-row').classList.remove('dragging');
    });
    wrap.addEventListener('dragover', e => {
      e.preventDefault();
      wrap.querySelector('.task-row').classList.add('drag-over');
    });
    wrap.addEventListener('dragleave', () => {
      wrap.querySelector('.task-row').classList.remove('drag-over');
    });
    wrap.addEventListener('drop', e => {
      e.preventDefault();
      wrap.querySelector('.task-row').classList.remove('drag-over');
      if (!dragSrc || dragSrc === wrap.dataset.id) return;
      const tasks = getTasks();
      const fromIdx = tasks.findIndex(t => t.id === dragSrc);
      const toIdx = tasks.findIndex(t => t.id === wrap.dataset.id);
      if (fromIdx < 0 || toIdx < 0) return;
      const arr = [...tasks];
      const [item] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, item);
      setTasks(arr);
    });
  });

  // Long-press to reorder on mobile (haptic feedback hint)
  scroll.querySelectorAll('.drag-handle').forEach(handle => {
    let timer;
    handle.addEventListener('touchstart', () => {
      timer = setTimeout(() => {
        if (navigator.vibrate) navigator.vibrate(10);
      }, 400);
    }, {passive: true});
    handle.addEventListener('touchend', () => clearTimeout(timer), {passive: true});
  });
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
const input = document.getElementById('task-input');
const addBtn = document.getElementById('add-btn');

input.addEventListener('input', () => {
  addBtn.disabled = !input.value.trim();
});

function addTask() {
  const text = input.value.trim();
  if (!text) return;
  setTasks([...getTasks(), { id: uid(), text, done: false }]);
  input.value = '';
  addBtn.disabled = true;
  input.focus();
}

addBtn.addEventListener('click', addTask);
input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

// ── CALENDAR TOGGLE ──────────────────────────────────────────────────────────
document.getElementById('cal-btn').addEventListener('click', () => {
  showCal = !showCal;
  document.getElementById('input-bar').style.display = showCal ? 'none' : '';
  render();
});

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();

// Rollover check on visibility change (app comes to foreground)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    const fresh = rollover(load());
    state = fresh;
    render();
  }
});
</script>
</body>
